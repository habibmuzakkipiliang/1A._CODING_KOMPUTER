<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Bootstrap HTML 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body style="background-color: yellow;">
    <header class="bg-info">
        <h1 align="center">Sample Bootstrap HTML</h1>
    </header>
    <main>
        <article>
            <div class="container">
                <div class="row">
                    <div class="col-sm-6 bg-warning">
                        <fieldset>
                            <form action="get.html" method="get">
                                <label for="Waktu pengisian ">Waktu pengisian</label>
                                <input type="datetime-local" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <hr>
                                <label for="Nama lengkap">Nama lengkap :</label>
                                <input type="text" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <label for="Nama panggilan">Nama panggilan :</label>
                                <input type="text" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <label for="Kelas">Kelas :</label>
                                <input type="text" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <label for="Asal">Asal :</label>
                                <input type="text" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <label for="Tempat lahir">Tempat lahir :</label>
                                <input type="text" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <label for="Tanggal lahir">Tanggal lahir :</label>
                                <input type="date" name="" id="" placeholder="Wajib diiisi" required>
                                <p>
                                </p>
                                <label for="Usia">Usia :</label>
                                <input type="text" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <label for="Email">Email :</label>
                                <input type="email" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <label for="Nomor hp">Nomor hp :</label>
                                <input type="tel" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <label for="Agama">Agama :</label>
                                <input type="text" name="" id="" placeholder="Wajib diisi" required>
                                <hr>
                                <b>Pilihan :</b>
                                <input type="reset" value="Hapus">
                                <input type="submit" value="Kirim">
                            </form>
                        </fieldset>
                    </div>
                    <div class="col-sm-5 bg-success">
                        <fieldset>
                            <form action="login.com" method="get">
                                <label for="Login">Login :</label>
                                <input type="email" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <label for="Password">Password :</label>
                                <input type="password" name="" id="" placeholder="Wajib diisi" required>
                                <p>
                                </p>
                                <hr>
                                <b>Pilihan :</b>
                                <input type="reset" value="Hapus">
                                <input type="submit" value="Kirim">
                            </form>
                        </fieldset>
                    </div>
                </div>
            </div>
        </article>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
