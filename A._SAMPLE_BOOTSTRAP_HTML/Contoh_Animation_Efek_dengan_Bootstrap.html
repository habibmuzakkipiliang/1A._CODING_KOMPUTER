<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoh Animation Efek dengan bootstrap</title>
</head>
<style>
    .body {
        background-color: chartreuse;
        color: black;
        font-size: medium;
        font-family: sans-serif;
    }

    h1,footer {
        background-color: aqua;
        color: black;
        font-size: medium;
        font-family: sans-serif;
    }
</style>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<body class="body">
    <h1 align="center">Contoh Animation Efek dengan bootstrap</h1>

    <div class="container">
        <div class="row">
            <div class="col-sm-30" style="background-color: white;" >
                <p>
                    Lorem ipsum dolor sit, amet consectetur adipisicing elit. Aspernatur enim dolore dolores quidem adipisci laboriosam unde quisquam molestias iure dolor. Optio ipsum modi veritatis eligendi nulla? Eveniet eaque eum possimus.
                </p>
                
                <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.17.2/dist/sweetalert2.all.min.js"></script>

                <script>
                    function contohLoper() {
                        swal.fire ({
                            title: "SELAMAT",
                            text: "Alert itu berhasil dijalankan",
                            icon: "success",
                            iconColor: "#4CAF50",
                            confirmButtonText: "OK",
                            confirmButtonColor: "Red",
                            background: "white",
                            color: "black"
                        });
                    }
                </script>
                 
                <button class="btn btn-primary" onclick="contohLoper()">KLIK SAJA YA DENGAN PD KAMU</button>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</html>
