<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing Image</title>
</head>
<style>
    div {
        width: 352px;
        background-color: yellow;
    }
    img {
        width: 300px;
        background-color: lightgreen;
        margin: 1px;
        padding: 20px;
        border: 3px solid black;
        box-sizing: border-box;
    }
    @media (max-width: 768px) {
        .card {
            flex: 1 1 calc(50% - 40px);
        }
    }
    @media (max-width: 480px) {
        .card {
            flex: 1 1 100%;
        }
    }
</style>
<body>
    <header>
        <h1 class="card">Box Sizing Image</h1>
    </header>

    <main class="card">
        <article>
            <div>
                <img src="https://akcdn.detik.net.id/visual/2020/03/05/44bdbc9b-f67a-4df2-873a-1cd6af939e5a_11.jpeg?w=480&q=90" alt=""><br>
                <hr>
                <img src="https://akcdn.detik.net.id/visual/2020/03/05/44bdbc9b-f67a-4df2-873a-1cd6af939e5a_11.jpeg?w=480&q=90ng" alt=""><br>
                <hr>
                <img src="https://akcdn.detik.net.id/visual/2020/03/05/44bdbc9b-f67a-4df2-873a-1cd6af939e5a_11.jpeg?w=480&q=90" alt=""><br>
                <img src="https://akcdn.detik.net.id/visual/2020/03/05/44bdbc9b-f67a-4df2-873a-1cd6af939e5a_11.jpeg?w=480&q=90" alt=""><br>
                <hr>
                <img src="https://akcdn.detik.net.id/visual/2020/03/05/44bdbc9b-f67a-4df2-873a-1cd6af939e5a_11.jpeg?w=480&q=90" alt=""><br>
            </div>
        </article>
    </main>
</body>
</html>
