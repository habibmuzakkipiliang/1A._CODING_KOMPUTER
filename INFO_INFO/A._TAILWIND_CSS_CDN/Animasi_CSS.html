<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi CSS 2</title>
</head>
<style>
    body {
        font-family: 'Courier New', Courier, monospace;
        font-size:  16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #f0f0f0;
        color: #333;
    }

    .box-contoh {
        width: 200px;
        height: 200px;
        background-color: #4CAF50;
        margin: 20px;
        transition: transform 0.5s ease, background-color 0.5s ease;
    }

    .box-contoh:hover {
        transform: scale(1.2);
        background-color: #45a049;
    }
</style>
<body>
    <h1>Animasi dan Transisi dalam CSS</h1>

    <h3>Aku mau libur saja</h3>
    <div class="box-contoh"></div>

    <h3>Aku mau libur panjang</h3>
    <div class="box-contoh"></div>
</body>
</html>
