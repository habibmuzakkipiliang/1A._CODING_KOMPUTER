<style>
    .body {
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: chartreuse;
        color: #333;
        margin: 0;
        padding: 0;
        line-height: 2.6em;
    }

    header {
        background-color: #00bcd4;
        color: white;
        text-align: center;
        padding: 20px 0;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 1.8rem;
        font-weight: bold;
        margin: 0;
    }

    table {
        border-collapse: collapse;
        background-color: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    th {
        background-color: #4CAF50;
        color: white;
        text-align: center;
        padding: 10px;
    }

    td {
        padding: 10px 15px;
        border-top: 1px solid #dee2e6;
    }

    tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    tr:hover {
        background-color: #e9f5ee;
    }

    .footer {
        background-color: #00bcd4;
        color: white;
        text-align: center;
        padding: 10px 0;
        margin-top: 30px;
        font-size: 1 em;
        font-weight: bold;
    }
</style>
