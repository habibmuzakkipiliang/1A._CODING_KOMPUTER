<script>
    function getLastModified() {
        const options = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Jakarta' };
        const lastModified = new Date(document.lastModified).toLocaleString('id-ID', options);
        document.getElementById("lastModified").textContent = `Terakhir diperbarui: ${lastModified} WIB`;
    }
</script>
<b>
    <body onload="getLastModified()">
        <p id="lastModified"></p>
        </body>
</b>
